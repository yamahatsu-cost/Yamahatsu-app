<!<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA系 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="コスト計算" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2233df" />

  <!-- キャッシュ殺し -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- アイコン（ここもバージョン揃える） -->
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260410-7" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=20260410-7" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png?v=20260410-7" />
  <link rel="icon" href="./favicon.ico?v=20260410-7" />
  <link rel="manifest" href="./site.webmanifest?v=20260410-7" />

  <title>輸出コスト計算</title>

  <!-- 🔥 自動最新へリダイレクト -->
  <script>
    (function() {
      var version = '20260410-7';
      var target = './app-' + version + '.html?v=' + Date.now();

      var current = location.pathname.split('/').pop();

      // 同じファイルにいる場合は何もしない（無限ループ防止）
      if (!current.includes('app-' + version + '.html')) {
        location.replace(target);
      }
    })();
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f3f7fb;
      color: #17324d;
    }
    .box {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d7e3f0;
      border-radius: 18px;
      padding: 18px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="box">
    最新版を読み込んでいます…
  </div>
</body>
</html>
